version: "3"

dotenv:
  - .env

vars:
  API_URL:
    sh: |
      fqdn="{{.BUBLIK_FQDN}}"
      prefix="{{.URL_PREFIX}}"
      fqdn="${fqdn%/}"
      prefix="${prefix#/}"
      prefix="${prefix%/}"
      if [ -n "$prefix" ]; then
        echo "$fqdn/$prefix"
      else
        echo "$fqdn"
      fi
  BACKUP_DIR:
    sh: echo "${CLI_ARGS:-backups}"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  ###########################################
  #         Git                             #
  ###########################################
  init:
    desc: Initialize Git submodules
    aliases: [i]
    status:
      - |
        # Check if all submodules are initialized and up to date
        test -z "$(git submodule status | grep '^-\|^+')"
    cmds:
      - git submodule init
      - git submodule update --init --recursive

  update:
    desc: Update Git submodules to latest commits
    aliases: [u]
    status:
      - |
        # Check if any submodule needs updating
        test -z "$(git submodule status | grep '^+')"
    cmds:
      - git submodule update --remote

  ###########################################
  #         Docker Environment              #
  ###########################################
  docker:setup:
    desc: Setup Docker environment (copy env and settings files)
    aliases: [setup]
    deps: [system:check-deps, docker:check-deps]
    silent: true
    status:
      - test -f bublik/bublik/settings.py && test "$(stat -c %Y docker-settings.py.template)" -le "$(stat -c %Y bublik/bublik/settings.py)"
    cmds:
      - |
        if [ ! -f ".env" ]; then
          echo "📝 Creating .env from template..."
          cp .env.local .env
          echo "✅ Created .env file"
        else
          echo "⏭️ Using existing .env file"
          echo "ℹ️  To reset to defaults, remove .env and run setup again"
        fi

        # Handle settings.py
        if [ -f "bublik/settings.py" ]; then
          echo "⚠️  Removing existing settings.py..."
          rm bublik/settings.py
        fi
        echo "📝 Copying docker settings template..."
        cp docker-settings.py.template ./bublik/bublik/settings.py
        echo "✅ Docker environment setup complete!"

  docker:dev:watch:
    desc: Start Docker development environment in watch mode
    deps: [docker:setup]
    aliases: [dev:watch]
    cmds:
      - docker compose -f docker-compose.dev.yml up --build --watch
      - echo "🚀 Docker development environment started at {{.BUBLIK_FQDN}}"

  docker:dev:up:
    desc: Start Docker development environment
    deps: [docker:setup]
    aliases: [dev:up]
    cmds:
      - docker compose -f docker-compose.dev.yml up --build -d
      - echo "🚀 Docker development environment started at {{.BUBLIK_FQDN}}"

  docker:up:
    desc: Start Docker production environment
    deps: [docker:setup]
    aliases: [up]
    cmds:
      - docker compose -f docker-compose.yml up --build -d
      - echo "🚀 Docker production environment started at {{.BUBLIK_FQDN}}"

  docker:down:
    desc: Stop Docker development environment
    aliases: [down]
    cmds:
      - docker compose -f docker-compose.yml down

  docker:dev:down:
    desc: Stop Docker development environment
    aliases: [dev:down]
    cmds:
      - docker compose -f docker-compose.dev.yml down

  import-logs:
    desc: Import logs from a specified .tar file
    summary: |
      Import logs from a specified .tar file
      Usage: task import-logs -- ./path/to/file.tar
    silent: true
    vars:
      FILE: "{{.CLI_ARGS}}"
    cmds:
      - |
        if [ -z "{{.FILE}}" ]; then
          echo "❌ No file specified"
          echo "Usage: task import-logs -- ./path/to/file.tar"
          exit 1
        fi

        if [ ! -f "{{.FILE}}" ]; then
          echo "❌ File not found: {{.FILE}}"
          exit 1
        fi

        FILENAME=$(basename "{{.FILE}}")
        echo "📝 Copying $FILENAME to container..."
        docker cp "{{.FILE}}" te-log-server:/home/te-logs/incoming/

        echo "🔄 Processing logs..."

        # Kinda hacky, but it works
        # Fix permissions before processing
        docker exec te-log-server chown -R www-data:www-data /home/te-logs/incoming/
        docker exec -it te-log-server /bin/bash -c "cd /home/te-logs/bin && ./publish-incoming-logs"
        # Fix permissions after processing
        docker exec te-log-server chown -R www-data:www-data /home/te-logs/logs/
        docker exec te-log-server chmod -R 755 /home/te-logs/logs/

  docker:nuke:
    prompt: |
      This will remove all containers, volumes, and unused images.
      YOU WILL LOSE ALL YOUR DATA!
      Are you sure you want to continue? [y/N]
    desc: Clean Docker environment (images, volumes, and logs)
    aliases: [nuke]
    cmds:
      - docker compose -f docker-compose.dev.yml down -v
      - docker compose -f docker-compose.yml down -v
      - docker system prune -af
      - test -f .env && rm .env

  ###########################################
  #         Deps                          #
  ###########################################

  check-deps:
    desc: Check if system dependencies are installed
    cmds:
      - task: system:check-deps
      - task: docker:check-deps

  system:check-deps:
    desc: Check if system dependencies are installed
    internal: true
    silent: true
    cmds:
      - |
        echo "🔍 Checking system dependencies..."
        if ! command -v jq &> /dev/null; then
          echo "⚠️  jq is not installed!"
          echo "To install jq:"
          echo "  sudo apt-get install jq"
          exit 1
        fi
        if ! command -v curl &> /dev/null; then
          echo "⚠️  curl is not installed!"
          echo "To install curl:"
          echo "  sudo apt-get install curl"
          exit 1
        fi
        echo "✅ All system dependencies are installed"

  docker:check-deps:
    desc: Check if Docker and Docker Compose are installed
    internal: true
    silent: true
    cmds:
      - |
        echo "🔍 Checking Docker installation..."
        if ! command -v docker &> /dev/null; then
          echo "⚠️  Docker is not installed!"
          echo ""
          echo "Quick Install (using convenience script):"
          echo "  curl -fsSL https://get.docker.com -o get-docker.sh"
          echo "  sudo sh get-docker.sh"
          echo ""
          echo "📚 For more installation options, visit:"
          echo "  https://docs.docker.com/engine/install/ubuntu/#install-using-the-convenience-script"
          echo ""
          echo "🔧 After installation, don't forget the post-installation steps:"
          echo "  1. Add your user to docker group:"
          echo "     sudo groupadd docker"
          echo "     sudo usermod -aG docker \$USER"
          echo "     newgrp docker"
          echo ""
          echo "  2. Configure Docker to start on boot:"
          echo "     sudo systemctl enable docker.service"
          echo "     sudo systemctl enable containerd.service"
          echo ""
          echo "📚 For detailed post-installation steps, visit:"
          echo "  https://docs.docker.com/engine/install/linux-postinstall/"
          exit 1
        fi

        if ! docker compose version &> /dev/null; then
          echo "⚠️  Docker Compose plugin is not installed!"
          echo "To install Docker Compose plugin:"
          echo "  sudo apt-get install docker-compose-plugin"
          echo ""
          echo "For more installation options, visit:"
          echo "  https://docs.docker.com/engine/install/ubuntu/#install-using-the-convenience-script"
          exit 1
        fi

        # Check if user is in docker group
        if ! groups | grep -q "docker"; then
          echo "⚠️  Your user is not in the docker group!"
          echo "This means you'll need to use sudo for docker commands."
          echo ""
          echo "To run Docker as a non-root user:"
          echo "  sudo groupadd docker"
          echo "  sudo usermod -aG docker \$USER"
          echo "  newgrp docker"
          echo ""
          echo "📚 For more information, visit:"
          echo "  https://docs.docker.com/engine/install/linux-postinstall/"
        else
          echo "✅ User is in docker group"
        fi

        echo "✅ Docker $(docker --version) is installed"
        echo "✅ Docker Compose $(docker compose version --short) is installed"

  ###########################################
  #         Shortcuts                       #
  ###########################################
  meta-categorization:
    desc: Trigger meta-categorization process
    silent: true
    cmds:
      - |
        echo "🚀 Starting meta-categorization..."
        RESPONSE=$(curl -s -X POST -w "\n%{http_code}" "{{.API_URL}}/meta_categorization/")
        BODY=$(echo "$RESPONSE" | sed '$d')  # Extract response body
        STATUS_CODE=$(echo "$RESPONSE" | tail -n1)  # Extract HTTP status code

        if [[ "$STATUS_CODE" =~ ^2 ]]; then
          echo "✅ Meta-categorization triggered successfully!"
        else
          echo "❌ Failed to trigger meta-categorization (HTTP $STATUS_CODE)"
          echo "🔍 Error response: $BODY"
          exit 1
        fi
  ###########################################
  #         Bootstrap                       #
  ###########################################
  bootstrap-dev:
    desc: Bootstrap the application and deploy to development environment
    cmds:
      - task: docker:dev:up
      - cmd: echo "Waiting for 10 seconds for services to start..." && sleep 10
      - task: bootstrap:init-configs
      - task: bootstrap:import-sessions
      - task: bootstrap:print-credentials

  bootstrap:
    desc: Bootstrap the application and deploy to production
    cmds:
      - task: docker:up
      - cmd: echo "Waiting for 10 seconds for services to start..." && sleep 10
      - task: bootstrap:init-configs
      - task: bootstrap:import-sessions
      - task: bootstrap:print-credentials

  bootstrap:print-credentials:
    desc: Print admin credentials
    silent: true
    cmds:
      - |
        echo "🔑 Admin credentials:"
        echo "  Email: {{.DJANGO_SUPERUSER_EMAIL}}"
        echo "  Password: {{.DJANGO_SUPERUSER_PASSWORD}}"

  bootstrap:import-sessions:
    desc: Import Test Sessions from specified file
    summary: |
      Import test sessions from a specified file containing URLs
      Usage: task bootstrap:import-sessions -- /path/to/import.txt
      Default file: bootstrap/import.txt
    deps: [auth:get-token]
    silent: true
    vars:
      IMPORT_FILE:
        sh: echo "${CLI_ARGS:-bootstrap/import.txt}"
    cmds:
      - |
        if [ ! -f "{{.IMPORT_FILE}}" ]; then
          echo "❌ Import file not found: {{.IMPORT_FILE}}"
          exit 1
        fi

        echo "📝 Using import file: {{.IMPORT_FILE}}"
        echo "📝 Import test sessions from {{.IMPORT_FILE}}? [y/N]"
        read -p "Continue? [y/N] " answer
        if [[ ! $answer =~ ^[Yy]$ ]]; then
          echo "⏭️ Import skipped"
          exit 0
        fi

        echo "📝 Starting test sessions import..."
        # Make sure file ends with newline and read each URL
        sed -e '$a\' "{{.IMPORT_FILE}}" | while read -r url; do
          # Skip empty lines and comments
          [[ -z "$url" || "$url" =~ ^[[:space:]]*# ]] && continue

          echo "🔄 Starting import: $url"
          curl -s "{{.API_URL}}/api/v2/importruns/source/?url=$url" \
            -H 'Content-Type: application/json' \
            -b cookies.txt >/dev/null

          sleep 1
          echo "✅ Import started"
        done

        echo "✅ All imports have been queued!"
      - defer: { task: auth:get-token:clean }

  bootstrap:init-configs:
    desc: Bootstrap Configs from specified directory
    summary: |
      Bootstrap configuration files from a specified directory
      Usage: task bootstrap:init-configs -- /path/to/config/dir
      Default directory: bootstrap/
    silent: true
    deps: [auth:get-token]
    vars:
      CONFIG_DIR:
        sh: echo "${CLI_ARGS:-bootstrap}"
    cmds:
      - |
        TOKEN=$(cat .access_token)
        if [ -z "$TOKEN" ]; then
          echo "❌ Failed to get access token"
          exit 1
        fi

        # Validate config directory
        if [ ! -d "{{.CONFIG_DIR}}" ]; then
          echo "❌ Config directory not found: {{.CONFIG_DIR}}"
          exit 1
        fi

        echo "📝 Using config directory: {{.CONFIG_DIR}}"
        echo "📝 Using login {{.DJANGO_SUPERUSER_EMAIL}} and password {{.DJANGO_SUPERUSER_PASSWORD}}"

        echo "📝 Do you want to bootstrap configs? [y/N]"
        read -p "Continue? [y/N] " answer
        if [[ ! $answer =~ ^[Yy]$ ]]; then
          echo "⏭️ Configs bootstrap skipped"
          exit 0
        fi

        config_exists() {
          local name=$1
          local type=$2
          local response

          response=$(curl -s "{{.API_URL}}/api/v2/config/" -b cookies.txt)

          if command -v jq >/dev/null 2>&1; then
            echo "$response" | jq -e ".[] | select(.name == \"$name\" and .type == \"$type\")" >/dev/null
          else
            # Fallback if jq is not available
            echo "$response" | grep -q "\"name\": \"$name\", \"type\": \"$type\""
          fi
          return $?
        }

        create_config() {
          local type=$1
          local name=$2
          local file=$3

          if [ ! -f "$file" ]; then
            echo "⚠️ Config file not found: $file, skipping..."
            return 0
          fi

          if config_exists "$name" "$type"; then
            echo "⏭️ Config '$name' ($type) already exists, skipping..."
            return 0
          fi

          echo "📝 Creating $type config '$name' from $file..."
          content=$(cat "$file")

          response=$(curl -s "{{.API_URL}}/api/v2/config/" \
            -H 'Content-Type: application/json' \
            -b cookies.txt \
            --data-raw "{
              \"type\": \"$type\",
              \"name\": \"$name\",
              \"description\": \"$name Configuration\",
              \"is_active\": true,
              \"content\": $content
            }")

          if echo "$response" | grep -q "id"; then
            echo "✅ Successfully created $name config"
          else
            echo "❌ Failed to create $name config"
            echo "Response: $response"
            exit 1
          fi
        }

        # Define config files to process
        declare -A configs=(
          ["report"]="report.json"
          ["meta"]="meta.json"
          ["tags"]="tags.json"
          ["references"]="references.json"
          ["per_conf"]="per_conf.json"
        )

        # Process each config
        for name in "${!configs[@]}"; do
          file="{{.CONFIG_DIR}}/${configs[$name]}"
          type="global"
          if [ "$name" = "report" ]; then
            type="report"
          fi
          create_config "$type" "$name" "$file"
        done

        echo "✅ All configs processed successfully!"
      - defer: { task: auth:get-token:clean }

  auth:get-token:
    desc: Get access token by logging in
    internal: true
    silent: true
    vars:
      EMAIL: '{{.DJANGO_SUPERUSER_EMAIL | default "admin@bublik.com"}}'
      PASSWORD: '{{.DJANGO_SUPERUSER_PASSWORD | default "admin"}}'
    cmds:
      - |
        echo "🔑 Logging in with {{.EMAIL}}..."
        response=$(curl -s -c cookies.txt "{{.API_URL}}/auth/login/" \
          -H 'Content-Type: application/json' \
          --data-raw "{\"email\":\"{{.EMAIL}}\",\"password\":\"{{.PASSWORD}}\"}")

        if grep -q "access_token" cookies.txt; then
          echo "✅ Successfully logged in"
          token=$(grep "access_token" cookies.txt | cut -f7)
          echo "$token" > .access_token
          echo "✅ Token saved to .access_token"
        else
          echo "❌ Login failed"
          echo "$response"
          exit 1
        fi

  auth:get-token:clean:
    desc: Clean up access token
    internal: true
    cmds:
      - rm -f cookies.txt .access_token

  ###########################################
  #         Database Operations             #
  ###########################################
  db:backup:
    desc: Create PostgreSQL database backup
    silent: true
    summary: |
      Create a backup of the PostgreSQL database
      Usage: task db:backup -- /path/to/backup/dir
      Default directory: ./backups/
    cmds:
      - |
        # Ensure backup directory exists
        mkdir -p "{{.BACKUP_DIR}}"

        # Generate backup filename with timestamp
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        BACKUP_FILE="{{.BACKUP_DIR}}/bublik_backup_${TIMESTAMP}.sql"

        echo "📦 Creating database backup..."
        echo "📝 Backup will be saved to: $BACKUP_FILE"

        # Create backup using pg_dump inside the container
        if docker exec postgres pg_dump \
          -U {{.DB_USER}} \
          -d {{.DB_NAME}} \
          --clean \
          --if-exists \
          --no-owner \
          --no-privileges \
          > "$BACKUP_FILE"; then
          echo "✅ Database backup created successfully at: $BACKUP_FILE"
          echo "📊 Backup size: $(du -h "$BACKUP_FILE" | cut -f1)"
        else
          echo "❌ Failed to create database backup"
          rm -f "$BACKUP_FILE"
          exit 1
        fi

  db:restore:
    desc: Restore PostgreSQL database from backup
    silent: true
    summary: |
      Restore database from a backup file
      Usage: task db:restore -- /path/to/backup/file.sql
    vars:
      BACKUP_FILE:
        sh: echo "$CLI_ARGS"
    cmds:
      - |
        if [ -z "{{.BACKUP_FILE}}" ]; then
          echo "❌ No backup file specified"
          echo "Usage: task db:restore -- /path/to/backup/file.sql"
          exit 1
        fi

        if [ ! -f "{{.BACKUP_FILE}}" ]; then
          echo "❌ Backup file not found: {{.BACKUP_FILE}}"
          exit 1
        fi

        echo "⚠️ This will overwrite the current database!"
        echo "📝 Restore from: {{.BACKUP_FILE}}"
        read -p "Continue? [y/N] " answer
        if [[ ! $answer =~ ^[Yy]$ ]]; then
          echo "⏭️ Restore cancelled"
          exit 0
        fi

        echo "🔄 Restoring database..."
        if cat "{{.BACKUP_FILE}}" | docker exec -i postgres psql \
          -U {{.DB_USER}} \
          -d {{.DB_NAME}}; then
          echo "✅ Database restored successfully"
        else
          echo "❌ Failed to restore database"
          exit 1
        fi

  db:list-backups:
    desc: List available database backups
    silent: true
    summary: |
      List all database backups in the backup directory
      Usage: task db:list-backups -- /path/to/backup/dir
      Default directory: ./backups/
    cmds:
      - |
        if [ ! -d "{{.BACKUP_DIR}}" ]; then
          echo "❌ Backup directory not found: {{.BACKUP_DIR}}"
          exit 1
        fi

        echo "📝 Available backups in {{.BACKUP_DIR}}:"
        echo "----------------------------------------"
        if ls -lh "{{.BACKUP_DIR}}"/*.sql 2>/dev/null; then
          echo "----------------------------------------"
        else
          echo "No backups found"
        fi

  ###########################################
  #         Backup Operations              #
  ###########################################
  backup:create:
    desc: Create a complete backup of database and TE logs
    silent: true
    summary: |
      Create a complete backup archive containing both database and TE logs
      Usage: task backup:create -- /path/to/backup/dir
      Default directory: ./backups/
    cmds:
      - |
        # Ensure backup directory exists
        mkdir -p "{{.BACKUP_DIR}}"

        # Generate backup filename with timestamp
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        BACKUP_DIR_NAME="bublik_backup_${TIMESTAMP}"
        FINAL_BACKUP_FILE="{{.BACKUP_DIR}}/${BACKUP_DIR_NAME}.tar.gz"

        # Create temporary directory for the backup
        TMP_DIR=$(mktemp -d)
        BACKUP_TMP_DIR="$TMP_DIR/$BACKUP_DIR_NAME"
        mkdir -p "$BACKUP_TMP_DIR"/{db,logs}

        echo "📦 Creating complete backup..."

        # Backup database
        echo "📝 Creating database backup..."
        if docker exec postgres pg_dump \
          -U {{.DB_USER}} \
          -d {{.DB_NAME}} \
          --clean \
          --if-exists \
          --no-owner \
          --no-privileges \
          > "$BACKUP_TMP_DIR/db/database.sql"; then
          echo "✅ Database backup created"
        else
          echo "❌ Failed to create database backup"
          rm -rf "$TMP_DIR"
          exit 1
        fi

        # Backup TE logs
        echo "📝 Creating TE logs backup..."
        if docker cp te-log-server:/home/te-logs/logs/. "$BACKUP_TMP_DIR/logs/"; then
          echo "✅ TE logs backup created"
        else
          echo "❌ Failed to copy logs from container"
          rm -rf "$TMP_DIR"
          exit 1
        fi

        # Create final archive
        echo "📝 Creating backup archive..."
        if tar -czf "$FINAL_BACKUP_FILE" -C "$TMP_DIR" "$BACKUP_DIR_NAME"; then
          echo "✅ Backup archive created successfully at: $FINAL_BACKUP_FILE"
          echo "📊 Backup size: $(du -h "$FINAL_BACKUP_FILE" | cut -f1)"
        else
          echo "❌ Failed to create backup archive"
          rm -f "$FINAL_BACKUP_FILE"
          rm -rf "$TMP_DIR"
          exit 1
        fi

        # Cleanup
        rm -rf "$TMP_DIR"

  backup:restore:
    desc: Restore both database and TE logs from a backup archive
    silent: true
    summary: |
      Restore complete backup from an archive
      Usage: task backup:restore -- /path/to/backup.tar.gz
    vars:
      BACKUP_FILE:
        sh: echo "$CLI_ARGS"
    cmds:
      - |
        if [ -z "{{.BACKUP_FILE}}" ]; then
          echo "❌ No backup file specified"
          echo "Usage: task backup:restore -- /path/to/backup.tar.gz"
          exit 1
        fi

        if [ ! -f "{{.BACKUP_FILE}}" ]; then
          echo "❌ Backup file not found: {{.BACKUP_FILE}}"
          exit 1
        fi

        echo "⚠️ This will overwrite both the current database and TE logs!"
        echo "📝 Restore from: {{.BACKUP_FILE}}"
        read -p "Continue? [y/N] " answer
        if [[ ! $answer =~ ^[Yy]$ ]]; then
          echo "⏭️ Restore cancelled"
          exit 0
        fi

        # Create temporary directory for extraction
        TMP_DIR=$(mktemp -d)

        echo "🔄 Extracting backup archive..."
        if tar -xzf "{{.BACKUP_FILE}}" -C "$TMP_DIR"; then
          BACKUP_DIR=$(find "$TMP_DIR" -maxdepth 1 -type d -name "bublik_backup_*")

          if [ -z "$BACKUP_DIR" ]; then
            echo "❌ Invalid backup archive structure"
            rm -rf "$TMP_DIR"
            exit 1
          fi

          # Restore database
          echo "🔄 Restoring database..."
          if [ -f "$BACKUP_DIR/db/database.sql" ]; then
            if cat "$BACKUP_DIR/db/database.sql" | docker exec -i postgres psql \
              -U {{.DB_USER}} \
              -d {{.DB_NAME}}; then
              echo "✅ Database restored successfully"
            else
              echo "❌ Failed to restore database"
              rm -rf "$TMP_DIR"
              exit 1
            fi
          else
            echo "❌ Database backup not found in archive"
            rm -rf "$TMP_DIR"
            exit 1
          fi

          # Restore TE logs
          echo "🔄 Restoring TE logs..."
          if [ -d "$BACKUP_DIR/logs" ]; then
            if docker cp "$BACKUP_DIR/logs/." te-log-server:/home/te-logs/logs/; then
              echo "🔧 Fixing permissions..."
              docker exec te-log-server chown -R www-data:www-data /home/te-logs/logs/
              docker exec te-log-server chmod -R 755 /home/te-logs/logs/
              echo "✅ TE logs restored successfully"
            else
              echo "❌ Failed to restore TE logs"
              rm -rf "$TMP_DIR"
              exit 1
            fi
          else
            echo "❌ TE logs not found in archive"
            rm -rf "$TMP_DIR"
            exit 1
          fi

          echo "✅ Complete backup restored successfully!"
        else
          echo "❌ Failed to extract backup archive"
          rm -rf "$TMP_DIR"
          exit 1
        fi

        # Cleanup
        rm -rf "$TMP_DIR"

  backup:list:
    desc: List available backup archives
    silent: true
    summary: |
      List all backup archives in the backup directory
      Usage: task backup:list -- /path/to/backup/dir
      Default directory: ./backups/
    cmds:
      - |
        if [ ! -d "{{.BACKUP_DIR}}" ]; then
          echo "❌ Backup directory not found: {{.BACKUP_DIR}}"
          exit 1
        fi

        echo "📝 Available backups in {{.BACKUP_DIR}}:"
        echo "----------------------------------------"
        if ls -lh "{{.BACKUP_DIR}}"/*.tar.gz 2>/dev/null; then
          echo "----------------------------------------"
        else
          echo "No backups found"
        fi
